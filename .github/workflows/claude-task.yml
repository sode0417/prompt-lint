name: Claude Code Task

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Claude Code に渡すプロンプト'
        required: true
        type: string
      issue_number:
        description: '関連する Issue 番号 (空欄可)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-task:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH_NAME="claude-task/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"

          PROMPT="${{ inputs.prompt }}"
          if [ -n "${{ inputs.issue_number }}" ]; then
            PROMPT="$PROMPT

          関連 Issue: #${{ inputs.issue_number }}
          コミットメッセージに 'Fixes #${{ inputs.issue_number }}' を含めてください。"
          fi

          claude -p "$PROMPT" --output-format json > /tmp/claude-output.json 2>&1 || true

          # 変更があるか確認
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "claude-code[bot]"
            git config user.email "claude-code[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Claude Code タスク実行

          Co-Authored-By: Claude <noreply@anthropic.com>"
            git push origin "$BRANCH_NAME"

            # PR 作成
            ISSUE_REF=""
            if [ -n "${{ inputs.issue_number }}" ]; then
              ISSUE_REF="

          Fixes #${{ inputs.issue_number }}"
            fi

            PR_URL=$(gh pr create \
              --title "🤖 ${{ inputs.prompt }}" \
              --body "$(cat <<EOF
          ## Claude Code による自動実行

          **プロンプト:** ${{ inputs.prompt }}
          ${ISSUE_REF}

          ---
          🤖 Generated by [Claude Code](https://claude.com/claude-code) via ai-assistant
          EOF
          )" \
              --head "$BRANCH_NAME" 2>&1)

            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes were made by Claude Code"
          fi
